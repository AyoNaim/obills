name: Android Release Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build web app (Static Export)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Unsigned Release Bundle (AAB)
        run: |
          cd android
          chmod +x gradlew
          # Changed from assembleDebug to bundleRelease to fix debugging error
          bash ./gradlew bundleRelease

      - name: Upload Unsigned AAB
        uses: actions/upload-artifact@v4
        with:
          name: obills-unsigned-release-bundle
          # Path points to the production bundle instead of the debug apk
          path: android/app/build/outputs/bundle/release/*.aab
